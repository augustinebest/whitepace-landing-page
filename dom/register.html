<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Register your account</h1>
    <p id="alertMessage"></p>
    <form type="submit" id="registerForm">
        <input type="text" id="fullName" placeholder="Enter your full name" /><br />
        <input type="email" id="email" placeholder="Enter your email address" /><br />
        <input type="password" id="password" placeholder="Enter your password" /><br />
        <button id="registerBtn" class="registerBtn">Register</button>
    </form>

    <p>Already have an account? <a href="./login.html">Login here</a></p>

    <script src="./js/register.js"></script>
</body>

</html>
